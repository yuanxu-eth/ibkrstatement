<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="IBKR Activity Statement parser and portfolio dashboard."
    />
    <title>IBKR Report Studio</title>
    <link rel="icon" type="image/svg+xml" href="./assets/icon.svg" />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div class="app-frame">
      <header class="topbar" aria-label="Application header">
        <a class="brand-lockup" href="./index.html" aria-label="IBKR Report Studio">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" role="img">
              <path d="M4 17.5h16" />
              <path d="M6.25 14.25l3.2-3.35 2.65 2.15 5.65-6.55" />
              <path d="M16 6.5h1.75V8.3" />
            </svg>
          </span>
          <span>
            <span class="brand-title">IBKR Report Studio</span>
            <span class="brand-subtitle">Activity Statement</span>
          </span>
        </a>
        <div class="topbar-actions">
          <div class="language-switcher" id="languageSwitcher" aria-label="Language selector">
            <button class="language-option" type="button" data-language="zh">中</button>
            <button class="language-option" type="button" data-language="en">EN</button>
          </div>
          <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle dark mode" title="Toggle dark mode">
            <span class="theme-toggle-option theme-toggle-sun" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="4" />
                <path d="M12 2v2" />
                <path d="M12 20v2" />
                <path d="m4.93 4.93 1.41 1.41" />
                <path d="m17.66 17.66 1.41 1.41" />
                <path d="M2 12h2" />
                <path d="M20 12h2" />
                <path d="m6.34 17.66-1.41 1.41" />
                <path d="m19.07 4.93-1.41 1.41" />
              </svg>
            </span>
            <span class="theme-toggle-option theme-toggle-moon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M20.3 15.2A8.5 8.5 0 0 1 8.8 3.7 8.5 8.5 0 1 0 20.3 15.2Z" />
              </svg>
            </span>
          </button>
          <button class="ghost-button hidden" id="resetButton" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 12a8 8 0 1 0 2.35-5.65" />
              <path d="M4 4v5h5" />
            </svg>
            <span id="resetLabel">重置</span>
          </button>
        </div>
      </header>

      <main id="app" class="app-main"></main>
    </div>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
